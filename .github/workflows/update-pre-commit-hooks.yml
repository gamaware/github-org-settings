name: Update Pre-commit Hooks

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    name: Update Hooks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.x"

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Auto-update hooks
        run: pre-commit autoupdate

      - name: Create PR
        uses: peter-evans/create-pull-request@271a8d0340265f705b14b6d32b9829c1cb33d45e # v7.0.8
        with:
          commit-message: "chore: update pre-commit hook versions"
          title: "chore: update pre-commit hook versions"
          body: |
            Automated update of pre-commit hook versions.

            Review the changes to `.pre-commit-config.yaml` and merge if CI passes.
          branch: chore/update-pre-commit-hooks
          delete-branch: true
